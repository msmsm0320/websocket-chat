<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring WebSocket Chat</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<main class="app">
    <section class="chat">
        <header class="chat__header">
            <div>
                <h1>Spring WebSocket Chat</h1>
                <p id="status">연결 대기 중</p>
            </div>
            <button id="connectButton" type="button">연결</button>
        </header>

        <div id="messages" class="messages" aria-live="polite"></div>

        <form id="chatForm" class="chat__form">
            <input id="senderInput" type="text" maxlength="20" placeholder="이름" autocomplete="nickname">
            <input id="messageInput" type="text" maxlength="500" placeholder="메시지를 입력하세요" autocomplete="off" disabled>
            <button id="sendButton" type="submit" disabled>전송</button>
        </form>
    </section>
</main>
<script src="/app.js"></script>
</body>
</html>
